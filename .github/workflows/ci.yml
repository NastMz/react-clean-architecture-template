name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: CI Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript check
        run: pnpm -C packages/template typecheck

      - name: Run linter
        run: pnpm -C packages/template lint

      - name: Run format check
        run: pnpm -C packages/template format

      - name: Run unit tests
        run: pnpm -C packages/template test

      - name: Install Playwright browsers
        run: pnpm -C packages/template exec playwright install chromium --with-deps

      - name: Run E2E tests
        run: pnpm -C packages/template test:e2e

      - name: Build application
        run: pnpm -C packages/template build
